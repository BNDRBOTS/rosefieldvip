<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ROSE FIELD | VIP DRIP EDITION</title>
    <style>
        /* 💎 QUANTUM-VERSACE CSS DRIP 💎 */
        :root {
            --wine: #5e102f;
            --rose: #c93a6c;
            --gold: #e0a96d;
        }
        body, html { 
            margin: 0; padding: 0; width: 100dvw; height: 100dvh; 
            background-color: #0d0208; overflow: hidden; touch-action: none; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            user-select: none; -webkit-user-select: none; 
            -webkit-tap-highlight-color: transparent; /* NO CHEAP GREY BOXES ALOWED IN THE VIP */
        }
        
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        canvas { display: block; width: 100%; height: 100%; -webkit-tap-highlight-color: transparent; }
        
        /* THE PLATINUM GATES (UI) */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle at center, rgba(26,5,16,0.7) 0%, rgba(13,2,8,0.95) 100%); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); transition: opacity 2.5s cubic-bezier(0.4, 0, 0.2, 1), backdrop-filter 2.5s; }
        
        .title { color: transparent; font-size: 2.5rem; letter-spacing: 0.8rem; font-weight: 200; margin-bottom: 2rem; background: linear-gradient(45deg, var(--rose), var(--gold), #fff); -webkit-background-clip: text; background-clip: text; animation: shimmerText 4s infinite linear; text-align: center; }
        
        .subtitle { color: var(--gold); font-size: 0.9rem; letter-spacing: 0.3rem; font-weight: 300; opacity: 0.8; padding: 15px 30px; border: 1px solid rgba(224, 169, 109, 0.2); border-radius: 50px; cursor: pointer; transition: all 0.4s ease; text-transform: uppercase; background: rgba(224, 169, 109, 0.05); -webkit-tap-highlight-color: transparent; outline: none; -webkit-appearance: none; appearance: none; }
        .subtitle:active { transform: scale(0.95); background: rgba(224, 169, 109, 0.2); box-shadow: 0 0 20px rgba(224, 169, 109, 0.4); }
        .subtitle:hover { background: rgba(224, 169, 109, 0.1); }
        
        #mute-btn { position: absolute; bottom: env(safe-area-inset-bottom, 30px); right: 30px; z-index: 20; background: rgba(26,5,16,0.5); border: 1px solid rgba(224, 169, 109, 0.3); color: var(--gold); border-radius: 50%; width: 54px; height: 54px; font-size: 1.2rem; cursor: pointer; display: none; transition: all 0.3s ease; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: center; opacity: 0; animation: fadeInUI 2s ease forwards 2.5s; -webkit-tap-highlight-color: transparent; outline: none; -webkit-appearance: none; appearance: none; }
        
        #fallback { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; display: none; background: radial-gradient(circle at center, #3a0a1d 0%, #0d0208 100%); }
        .css-bloom { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60vw; height: 60vw; border-radius: 50%; background: radial-gradient(circle, rgba(201, 58, 108, 0.3) 0%, transparent 70%); animation: breath 10s infinite alternate ease-in-out; mix-blend-mode: screen; }

        @keyframes shimmerText { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
        @keyframes breath { 0% { transform: translate(-50%, -50%) scale(0.7) rotate(0deg); opacity: 0.4; } 100% { transform: translate(-50%, -50%) scale(1.3) rotate(45deg); opacity: 1; } }
        @keyframes fadeInUI { to { opacity: 0.6; } }
    </style>
</head>
<body>

    <!-- CSS FALLBACK (FOR THE BROKE PHONES) -->
    <div id="fallback"><div class="css-bloom"></div><div class="css-bloom" style="animation-delay: -5s; width: 90vw; height: 90vw; background: radial-gradient(circle, rgba(224, 169, 109, 0.15) 0%, transparent 60%);"></div></div>

    <!-- 💎 THE AURA-FLEX CANVAS 💎 -->
    <div id="canvas-container"><canvas id="glcanvas"></canvas></div>

    <!-- LUXURY GATES -->
    <div id="ui-layer">
        <div class="title">ROSE FIELD</div>
        <div class="subtitle" id="enter-btn">Tap to Ascend</div>
    </div>
    <div id="mute-btn" style="display: none;">🔊</div>

    <script>
        /* 🎤 JODY HIGHROLLER AI - CORE LOGIC ENGINE 🎤 */
        const canvas = document.getElementById('glcanvas');
        const uiLayer = document.getElementById('ui-layer');
        const enterBtn = document.getElementById('enter-btn');
        const muteBtn = document.getElementById('mute-btn');
        const fallback = document.getElementById('fallback');
        
        let gl = canvas.getContext('webgl', { alpha: false, antialias: true }) || canvas.getContext('experimental-webgl');
        let audioCtx, masterGain, filterNode, crystalGain;
        let isMuted = false;
        let startTime = Date.now();
        
        // Touch dynamics
        let touchTarget = [0.5, 0.5];
        let touchCurrent = [0.5, 0.5];
        let touchActiveTarget = 0.0;
        let touchActiveCurrent = 0.0;

        // --- 🚀 LEVEL 3 AUDIO ENGINE: LIQUID VELVET RESONANCE 🚀 ---
        function initAudio() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            
            // 💎 THE MILLION DOLLAR COMPRESSOR (Prevents ear-bleeding)
            const compressor = audioCtx.createDynamicsCompressor();
            compressor.threshold.value = -20;
            compressor.knee.value = 30;
            compressor.ratio.value = 12;
            compressor.attack.value = 0.01;
            compressor.release.value = 0.25;
            compressor.connect(audioCtx.destination);

            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0;
            masterGain.connect(compressor);

            // 💎 INFINITE SPA DELAY NETWORK (Lush Reverb)
            const delay = audioCtx.createDelay(3.0);
            delay.delayTime.value = 1.2;
            const feedback = audioCtx.createGain();
            feedback.gain.value = 0.35;
            const delayFilter = audioCtx.createBiquadFilter();
            delayFilter.type = 'lowpass';
            delayFilter.frequency.value = 800;

            delay.connect(feedback);
            feedback.connect(delayFilter);
            delayFilter.connect(delay);
            delay.connect(masterGain);

            // The Diamond Filter - Starts deep and muffled
            filterNode = audioCtx.createBiquadFilter();
            filterNode.type = 'lowpass';
            filterNode.frequency.value = 300; // Deep, oceanic warmth
            filterNode.Q.value = 0.5;
            filterNode.connect(masterGain);
            filterNode.connect(delay);
            
            // VCA for breathing
            const breathGain = audioCtx.createGain();
            breathGain.gain.value = 0.6;
            breathGain.connect(filterNode);

            // LFO for slow breath
            const breathLFO = audioCtx.createOscillator();
            breathLFO.type = 'sine';
            breathLFO.frequency.value = 0.04;
            const lfoScale = audioCtx.createGain();
            lfoScale.gain.value = 0.4;
            breathLFO.connect(lfoScale).connect(breathGain.gain);
            breathLFO.start();

            // HELPER: Gold-Plated Oscillator Generator
            function makeOsc(freq, type, vol, pan) {
                const osc = audioCtx.createOscillator();
                osc.type = type;
                osc.frequency.value = freq;
                const g = audioCtx.createGain();
                g.gain.value = vol;
                osc.connect(g);
                if (pan !== 0 && audioCtx.createStereoPanner) {
                    const p = audioCtx.createStereoPanner();
                    p.pan.value = pan;
                    g.connect(p).connect(breathGain);
                } else {
                    g.connect(breathGain);
                }
                osc.start();
            }

            // 1. LIQUID SUB-BASS (159.75 Hz)
            makeOsc(159.75, 'sine', 1.0, 0);
            // 2. The Anchor (639 Hz)
            makeOsc(639, 'sine', 0.25, 0);
            // 3. Binaural Width
            makeOsc(635, 'sine', 0.15, -0.7);
            makeOsc(643, 'sine', 0.15, 0.7);
            // 4. Harmonic Gold Trim (958.5 Hz - Perfect Fifth)
            makeOsc(958.5, 'sine', 0.1, 0);

            // 5. The Crystal Touch 
            const oscCrystal = audioCtx.createOscillator();
            oscCrystal.type = 'sine';
            oscCrystal.frequency.value = 1278; 
            crystalGain = audioCtx.createGain();
            crystalGain.gain.value = 0.0;
            oscCrystal.connect(crystalGain).connect(masterGain); 
            crystalGain.connect(delay);
            oscCrystal.start();

            // Fade in the master
            masterGain.gain.linearRampToValueAtTime(0.85, audioCtx.currentTime + 6);
        }

        muteBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if(!audioCtx) return;
            isMuted = !isMuted;
            masterGain.gain.setTargetAtTime(isMuted ? 0 : 0.85, audioCtx.currentTime, 0.5);
            muteBtn.innerText = isMuted ? '🔇' : '🔊';
        });

        // --- 💎 LEVEL 2 WEBGL SHADER: DIAMOND-COATED BOTANICAL DRIP 💎 ---
        const vsSource = `
            attribute vec2 position;
            varying vec2 vUv;
            void main() { 
                vUv = position;
                gl_Position = vec4(position, 0.0, 1.0); 
            }
        `;

        const fsSource = `
            precision highp float;
            uniform vec2 u_resolution;
            uniform float u_time;
            uniform vec2 u_touch;
            uniform float u_touchActive;
            varying vec2 vUv;

            // Mathematical Swagger: Random noise for the diamond dust
            float random(vec2 st) {
                return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123);
            }

            // 2D Rotation Matrix
            mat2 rot(float a) {
                float s = sin(a), c = cos(a);
                return mat2(c, -s, s, c);
            }

            // The VIP Palette
            vec3 getDripColor(float t) {
                vec3 wine = vec3(0.37, 0.06, 0.18);
                vec3 rose = vec3(0.79, 0.23, 0.42);
                vec3 gold = vec3(0.88, 0.66, 0.43);
                vec3 magenta = vec3(0.5, 0.1, 0.4);
                
                vec3 col = mix(wine, rose, sin(t * 3.14) * 0.5 + 0.5);
                col = mix(col, gold, sin(t * 2.0 + u_time * 0.5) * 0.3 + 0.2);
                return col;
            }

            void main() {
                // Normalize and fix aspect ratio
                vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy) / min(u_resolution.x, u_resolution.y);
                vec2 uv0 = uv;
                
                // Touch Ripple Physics
                vec2 touchNorm = (u_touch - 0.5 * u_resolution.xy) / min(u_resolution.x, u_resolution.y);
                float distToTouch = length(uv - touchNorm);
                
                // Hyper-velvet ripple effect
                float ripple = sin(distToTouch * 15.0 - u_time * 4.0) * exp(-distToTouch * 3.0) * u_touchActive;
                uv += normalize(uv - touchNorm) * ripple * 0.05;

                float globalBreath = sin(u_time * 0.3) * 0.5 + 0.5;
                vec3 finalColor = vec3(0.0);
                
                // Slowly rotate the entire universe
                uv *= rot(u_time * 0.05);

                // Multi-layered Procedural Lotus Generation
                float d_total = 0.0;
                for (float i = 1.0; i <= 4.0; i++) {
                    // Zoom and twist each layer
                    vec2 layerUv = uv * (1.0 + i * 0.4 - u_touchActive * 0.15) * rot(i * 1.5 + u_time * 0.1 * (mod(i, 2.0) == 0.0 ? 1.0 : -1.0));
                    
                    float r = length(layerUv);
                    float a = atan(layerUv.y, layerUv.x);
                    
                    // Organic petal math (Huskytron Elite Algorithm)
                    float petals = sin(a * 5.0 + u_time * 0.2) * 0.5 + 0.5;
                    petals = pow(petals, 1.5) * 0.3; // Sharpen petals slightly
                    
                    float d = r - petals - (globalBreath * 0.05) - (u_touchActive * 0.1);
                    d = smoothstep(0.05, 0.0, d); // Soft, glowing edges
                    
                    // Assign luxury colors based on depth and angle
                    vec3 layerCol = getDripColor(r * 2.0 - a * 0.1 + i * 0.2);
                    
                    // Add the "Diamond-Coated" sparkle conditionally on the edges
                    float sparkle = random(layerUv * 10.0 + u_time) * step(0.98, random(layerUv * 20.0 - u_time));
                    layerCol += vec3(1.0, 0.9, 0.7) * sparkle * d * 2.0;

                    finalColor += layerCol * d * (0.6 / i) * (1.0 + u_touchActive * 0.5);
                }

                // Ethereal Center Glow (Heart opening)
                float centerGlow = exp(-length(uv0) * (3.0 - u_touchActive));
                finalColor += vec3(0.9, 0.5, 0.6) * centerGlow * 0.5;

                // Gold Dust Particles
                float dust = random(uv0 + u_time * 0.1) * step(0.995, random(uv0 - u_time * 0.05));
                finalColor += vec3(1.0, 0.8, 0.4) * dust * (0.5 + u_touchActive);

                // Luxurious Vignette
                float vignette = smoothstep(1.2, 0.2, length(uv0));
                finalColor *= vignette;
                
                // Add ambient deep shadows so it's not totally black
                finalColor += vec3(0.05, 0.01, 0.03) * (1.0 - vignette);

                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        function initWebGL() {
            if (!gl) { 
                fallback.style.display = 'block'; 
                console.log("No WebGL? You getting the CSS Fallback. Still drippy though.");
                return false; 
            }
            
            const vShader = gl.createShader(gl.VERTEX_SHADER);
            gl.shaderSource(vShader, vsSource);
            gl.compileShader(vShader);
            
            const fShader = gl.createShader(gl.FRAGMENT_SHADER);
            gl.shaderSource(fShader, fsSource);
            gl.compileShader(fShader);
            
            // Check for shader compile errors
            if (!gl.getShaderParameter(fShader, gl.COMPILE_STATUS)) {
                console.error(gl.getShaderInfoLog(fShader));
                return false;
            }

            const program = gl.createProgram();
            gl.attachShader(program, vShader);
            gl.attachShader(program, fShader);
            gl.linkProgram(program);
            gl.useProgram(program);

            const vertices = new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]);
            const buffer = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
            gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);

            const posLoc = gl.getAttribLocation(program, 'position');
            gl.enableVertexAttribArray(posLoc);
            gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

            const resLoc = gl.getUniformLocation(program, 'u_resolution');
            const timeLoc = gl.getUniformLocation(program, 'u_time');
            const touchLoc = gl.getUniformLocation(program, 'u_touch');
            const touchActLoc = gl.getUniformLocation(program, 'u_touchActive');

            function resize() {
                const pixelRatio = Math.min(window.devicePixelRatio || 1, 2); // Cap at 2x for performance
                canvas.width = window.innerWidth * pixelRatio;
                canvas.height = window.innerHeight * pixelRatio;
                gl.viewport(0, 0, canvas.width, canvas.height);
                gl.uniform2f(resLoc, canvas.width, canvas.height);
            }
            window.addEventListener('resize', resize);
            resize();

            function render() {
                // Liquid smooth interpolation for touch
                touchCurrent[0] += (touchTarget[0] - touchCurrent[0]) * 0.08;
                touchCurrent[1] += (touchTarget[1] - touchCurrent[1]) * 0.08;
                touchActiveCurrent += (touchActiveTarget - touchActiveCurrent) * 0.05;
                
                // Map touch to audio parameters dynamically if audio is active
                if(audioCtx && filterNode && crystalGain) {
                    const baseFreq = 300; // DROPPED FOR VELVET WARMTH
                    const maxFreq = 1600; // CAPPED HIGHS
                    filterNode.frequency.setTargetAtTime(baseFreq + (maxFreq - baseFreq) * touchActiveCurrent, audioCtx.currentTime, 0.1);
                    crystalGain.gain.setTargetAtTime(0.15 * touchActiveCurrent, audioCtx.currentTime, 0.1);
                }
                
                gl.uniform1f(timeLoc, (Date.now() - startTime) / 1000.0);
                
                // Adjust touch coordinates for WebGL space
                const pixelRatio = Math.min(window.devicePixelRatio || 1, 2);
                gl.uniform2f(touchLoc, touchCurrent[0] * pixelRatio, (window.innerHeight - touchCurrent[1]) * pixelRatio);
                gl.uniform1f(touchActLoc, touchActiveCurrent);
                
                gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
                requestAnimationFrame(render);
            }
            render();
            return true;
        }

        // --- THE GRAND ENTRANCE ---
        enterBtn.addEventListener('click', () => {
            uiLayer.style.backdropFilter = 'blur(0px)';
            uiLayer.style.webkitBackdropFilter = 'blur(0px)';
            uiLayer.style.opacity = '0';
            
            setTimeout(() => { 
                uiLayer.style.display = 'none'; 
                muteBtn.style.display = 'flex'; 
            }, 2500);
            
            if(!audioCtx) initAudio();
            if(!gl) initWebGL(); // Init if not already done (fallback case handles it)
        });

        // Initialize visually immediately so it's playing behind the UI
        initWebGL();

        // --- FLUID INTERACTION SENSORS ---
        const handleTouch = (e) => {
            // Prevent default scrolling/bouncing on mobile
            if(e.cancelable) e.preventDefault(); 
            touchTarget[0] = e.touches ? e.touches[0].clientX : e.clientX;
            touchTarget[1] = e.touches ? e.touches[0].clientY : e.clientY;
        };
        
        // Use pointer events for unified mouse/touch handling
        canvas.addEventListener('pointerdown', (e) => { 
            touchActiveTarget = 1.0; 
            handleTouch(e); 
        }, {passive: false});
        
        canvas.addEventListener('pointermove', (e) => { 
            if(touchActiveTarget > 0) handleTouch(e); 
        }, {passive: false});
        
        canvas.addEventListener('pointerup', () => { touchActiveTarget = 0.0; });
        canvas.addEventListener('pointerleave', () => { touchActiveTarget = 0.0; });
        
        // Touch specific fallbacks to ensure mobile non-scrolling
        canvas.addEventListener('touchstart', handleTouch, {passive: false});
        canvas.addEventListener('touchmove', handleTouch, {passive: false});
    </script>
</body>
</html>
